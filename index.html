<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Reading Room</title>
  <meta name="description" content="Your daily curated content digest" />
  <meta name="theme-color" content="#15120e" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #15120e;
      --surface:  #1c1812;
      --surf-h:   #221e16;
      --border:   #2a2419;
      --border-s: #3a3028;
      --text:     #e4d9c4;
      --muted:    #7a6f5e;
      --accent:   #c4622d;
      --serif:    'Iowan Old Style','Palatino Linotype',Georgia,serif;
      --sans:     -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      --rad-md:   6px;
      --rad-lg:   10px;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }
    #app { max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }

    .header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 28px 0 20px; border-bottom: 1px solid var(--border);
      margin-bottom: 20px; gap: 12px;
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .title { font-family: var(--serif); font-size: 24px; font-weight: 400; letter-spacing: -0.3px; }
    .meta  { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .refresh-btn {
      flex-shrink: 0; padding: 8px 18px; font-size: 13px; font-family: var(--sans);
      cursor: pointer; border-radius: var(--rad-md); border: 1px solid var(--border-s);
      background: transparent; color: var(--text); transition: background .15s;
    }
    .refresh-btn:hover:not(:disabled) { background: var(--surface); }
    .refresh-btn.loading { background: var(--accent); border-color: var(--accent); color: #fff; }
    .refresh-btn:disabled { opacity: .45; cursor: not-allowed; }

    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; min-height: 28px; }
    .chip {
      padding: 4px 13px; font-size: 12px; border-radius: 20px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; font-family: var(--sans); transition: all .15s;
    }
    .chip:hover { border-color: var(--border-s); color: var(--text); }
    .chip.on  { background: var(--surface); color: var(--text); border-color: var(--border-s); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 14px; }

    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--rad-lg);
      padding: 18px 20px; display: flex; flex-direction: column; gap: 10px;
      transition: border-color .15s, background .15s;
    }
    .card:hover { border-color: var(--border-s); background: var(--surf-h); }
    .card.read  { opacity: .38; }

    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .nl-label  { font-size: 10px; font-weight: 600; color: var(--accent); letter-spacing: .6px; text-transform: uppercase; }
    .mr-btn {
      font-size: 10px; padding: 2px 8px; border: 1px solid var(--border); border-radius: var(--rad-md);
      background: transparent; color: var(--muted); cursor: pointer; font-family: var(--sans); flex-shrink: 0;
    }
    .mr-btn:hover { border-color: var(--border-s); color: var(--text); }

    .card-title {
      font-family: var(--serif); font-size: 16px; font-weight: 400; line-height: 1.4;
      color: var(--text); text-decoration: none; display: block;
    }
    .card-title:hover { color: var(--accent); }

    .card-excerpt { font-size: 13px; color: var(--muted); line-height: 1.65; font-style: italic; }

    .card-footer {
      font-size: 11px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap;
      padding-top: 10px; border-top: 1px solid var(--border); margin-top: auto;
    }

    .skel-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rad-lg); padding: 18px 20px; height: 180px; }
    .skel { background: var(--border-s); border-radius: 3px; margin-bottom: 10px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.4}50%{opacity:.85} }

    .empty  { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-icon { font-family: var(--serif); font-size: 36px; margin-bottom: 14px; opacity: .3; }
    .empty-msg  { font-size: 14px; font-style: italic; line-height: 1.6; }

    .err-bar {
      background: #1e1010; color: #e07070; border: 1px solid #3a2020;
      border-radius: var(--rad-md); padding: 12px 16px; font-size: 13px; margin-bottom: 20px;
    }
    .badge {
      display: inline-block; background: var(--accent); color: #fff;
      font-size: 10px; padding: 1px 6px; border-radius: 10px;
      margin-left: 6px; font-weight: 600; vertical-align: middle;
    }
    .failed-sources {
      font-size: 12px; color: var(--muted); margin-bottom: 16px;
      padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--rad-md);
    }

    @media(max-width:600px){
      #app{padding:0 16px 40px;}
      .header{padding:20px 0 16px;}
      .grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="title">The Reading Room</div>
      <div class="meta" id="meta">Hit refresh to load today's feed</div>
    </div>
    <button class="refresh-btn" id="btn" onclick="loadFeeds()">↻ Refresh</button>
  </div>
  <div class="filter-row" id="filters"></div>
  <div id="err" class="err-bar" style="display:none"></div>
  <div id="failed" class="failed-sources" style="display:none"></div>
  <div id="content">
    <div class="empty">
      <div class="empty-icon">✦</div>
      <div class="empty-msg">Your reading room is empty.<br>Hit Refresh to load today's feed.</div>
    </div>
  </div>
</div>

<script>
// ── EDIT YOUR SOURCES HERE ──────────────────────────────────────────────────
// Format: { name, author, feed }
// All Substacks follow the pattern: https://SLUG.substack.com/feed
// Verify slugs if a feed fails to load — check the actual Substack URL
const SOURCES = [
  { name:"Janel Labrahami",  author:"Janel Labrahami", feed:"https://janelabrahami.substack.com/feed" },
  { name:"Brie's Wax",       author:"Brie Wolfson",    feed:"https://brieswax.substack.com/feed" },
  { name:"Andrew Yeung",     author:"Andrew Yeung",    feed:"https://andrew.today/feed" },
  { name:"Bookbear Express", author:"Ava",             feed:"https://ava.substack.com/feed" },
  { name:"Always Curious",   author:"Rozi Zacharov",   feed:"https://rozizacharov.substack.com/feed" },
  { name:"Community Inc",    author:"Gareth Wilson",   feed:"https://newsletter.community.inc/feed" },
  { name:"Community Rising", author:"",                feed:"https://communityrising.substack.com/feed" },
  { name:"Every",            author:"Dan Shipper",     feed:"https://every.substack.com/feed" },
  { name:"Future/Proof",     author:"Dan Koe",         feed:"https://letters.thedankoe.com/feed" },
  { name:"Inside My Head",   author:"Linus Ekenstam",  feed:"https://linusekenstam.substack.com/feed" },
  { name:"Three Things",     author:"Lane Rettig",     feed:"https://rettig.substack.com/feed" },
  { name:"Milk and Cookies", author:"Ayushi Thakkar",  feed:"https://ayushithakkar.substack.com/feed" },
  { name:"Wellness Wisdom",  author:"",                feed:"https://wellnesswisdom.substack.com/feed" },
];
// ───────────────────────────────────────────────────────────────────────────

const RSS2JSON = "https://api.rss2json.com/v1/api.json?rss_url=";

let allPosts   = [];
let readSet    = new Set(JSON.parse(localStorage.getItem('rr-read') || '[]'));
let activeFilter = 'All';

async function fetchFeed(source) {
  try {
    const res  = await fetch(RSS2JSON + encodeURIComponent(source.feed));
    const data = await res.json();
    if (data.status !== 'ok') throw new Error('bad status');
    return (data.items || []).slice(0, 2).map(item => ({
      newsletter: source.name,
      author:     source.author || data.feed?.title || source.name,
      title:      item.title || '',
      url:        item.link || '',
      excerpt:    strip(item.description || item.content || '').slice(0, 220).trim() + '…',
      date:       fmtDate(item.pubDate),
      readTime:   estRead(item.content || item.description || ''),
    }));
  } catch {
    return null; // mark as failed
  }
}

async function loadFeeds() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  btn.classList.add('loading');
  document.getElementById('err').style.display = 'none';
  document.getElementById('failed').style.display = 'none';
  document.getElementById('filters').innerHTML = '';

  document.getElementById('content').innerHTML =
    `<div class="grid">${[...Array(8)].map(()=>`
      <div class="skel-card">
        <div class="skel" style="height:10px;width:42%;"></div>
        <div class="skel" style="height:20px;width:88%;"></div>
        <div class="skel" style="height:14px;width:100%;"></div>
        <div class="skel" style="height:14px;width:75%;"></div>
      </div>`).join('')}</div>`;

  const results = await Promise.all(SOURCES.map(fetchFeed));

  const failed  = SOURCES.filter((_, i) => results[i] === null).map(s => s.name);
  allPosts = results.filter(Boolean).flat();

  // sort by date descending
  allPosts.sort((a, b) => new Date(b._raw || 0) - new Date(a._raw || 0));

  const now = new Date();
  document.getElementById('meta').innerHTML =
    `Updated ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · ${allPosts.length} posts`;

  if (failed.length) {
    const fd = document.getElementById('failed');
    fd.style.display = 'block';
    fd.textContent = `Could not load: ${failed.join(', ')} — check the feed URLs in index.html`;
  }

  renderFilters();
  renderCards();

  btn.disabled  = false;
  btn.textContent = '↻ Refresh';
  btn.classList.remove('loading');
}

function renderFilters() {
  const sources = ['All', ...new Set(allPosts.map(p => p.newsletter))];
  document.getElementById('filters').innerHTML = sources.map(s =>
    `<button class="chip${s===activeFilter?' on':''}" onclick="setFilter('${esc(s)}')">${esc(s)}</button>`
  ).join('');
}

function setFilter(f) { activeFilter = f; renderFilters(); renderCards(); }

function markRead(key) {
  readSet.add(key);
  localStorage.setItem('rr-read', JSON.stringify([...readSet]));
  renderCards();
}

function renderCards() {
  const list   = activeFilter === 'All' ? allPosts : allPosts.filter(p => p.newsletter === activeFilter);
  const unread = list.filter(p => !readSet.has(p.url || p.title));

  const metaEl = document.getElementById('meta');
  const now    = new Date();
  metaEl.innerHTML =
    `Updated ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · ${allPosts.length} posts` +
    (unread.length ? `<span class="badge">${unread.length} unread</span>` : '');

  if (!list.length) {
    document.getElementById('content').innerHTML =
      '<div class="empty"><div class="empty-msg">No posts here yet.</div></div>';
    return;
  }

  document.getElementById('content').innerHTML =
    `<div class="grid">${list.map(p => {
      const key     = p.url || p.title;
      const isRead  = readSet.has(key);
      const safeKey = key.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return `
        <div class="card${isRead?' read':''}">
          <div class="card-top">
            <span class="nl-label">${esc(p.newsletter)}</span>
            ${!isRead?`<button class="mr-btn" onclick="markRead('${safeKey}')">mark read</button>`:''}
          </div>
          <a class="card-title" href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title)}</a>
          <div class="card-excerpt">${esc(p.excerpt)}</div>
          <div class="card-footer">
            <span>${esc(p.author)}</span>
            ${p.date?`<span>${esc(p.date)}</span>`:''}
            ${p.readTime?`<span>~${p.readTime} min</span>`:''}
          </div>
        </div>`;
    }).join('')}</div>`;
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function strip(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || d.innerText || '';
}

function fmtDate(str) {
  if (!str) return '';
  try {
    const d    = new Date(str);
    const diff = Date.now() - d;
    const days = Math.floor(diff / 86400000);
    if (days === 0) return 'Today';
    if (days === 1) return 'Yesterday';
    if (days < 7)  return `${days} days ago`;
    return d.toLocaleDateString('en-GB', {day:'numeric',month:'short'});
  } catch { return ''; }
}

function estRead(html) {
  const words = strip(html).split(/\s+/).length;
  return Math.max(1, Math.round(words / 200));
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// ────────────────────────────────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
